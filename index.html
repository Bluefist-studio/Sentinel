<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sentinel v1.4 Recreated</title>
  <link rel="icon" href="player_drone.png">
  <link rel="stylesheet" href="sentinel_v1.4_recreated.css">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      color: #fff;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: #000;
      display: block;
    }

    .scrollbar-themed {
      scrollbar-width: thin;
      scrollbar-color: rgba(0,255,221,0.75) rgba(0,0,0,0.18);
    }
    .scrollbar-themed::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    .scrollbar-themed::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.12);
      border-radius: 999px;
    }
    .scrollbar-themed::-webkit-scrollbar-thumb {
      background: rgba(0,255,221,0.8);
      border-radius: 999px;
      border: 2px solid rgba(0,0,0,0.18);
    }
    .scrollbar-themed::-webkit-scrollbar-thumb:hover {
      background: rgba(0,255,221,1);
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="1024" height="768"></canvas>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-leaderboard.js"></script>
  <script src="protocols.js"></script>
  <script src="waveControl.js"></script>
  <script src="sentinel_v1.4_recreated.js"></script>
  <script src="timelineEditorIntegration.js"></script>
  <script src="Editor.js"></script>
</body>
</html>
